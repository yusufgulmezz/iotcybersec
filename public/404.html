<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>IoTCyberSec</title>
    <script>
      // GitHub Pages SPA redirect (rafgnikrumS tabanlı)
      // /iotcybersec/portfolyo/x  ->  /iotcybersec/?/portfolyo/x
      // index.html bunu tekrar /iotcybersec/portfolyo/x adresine çevirir.
      (function () {
        var segmentCount = 1; // repo adı (iotcybersec) bir segment
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
